version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_URL: postgresql+asyncpg://anonymizer:anonymizer@postgres:5432/anonymizer
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ANONYMIZER_ENABLE_NER: "false"
      ANONYMIZER_PSEUDONYM_SECRET_KEY: change-me-in-production-32bytes!!
    depends_on:
      - postgres
      - redis
    volumes:
      - ./rules:/app/rules:ro

  worker:
    build: .
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info
    environment:
      DB_URL: postgresql+asyncpg://anonymizer:anonymizer@postgres:5432/anonymizer
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ANONYMIZER_ENABLE_NER: "false"
    depends_on:
      - redis
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: anonymizer
      POSTGRES_PASSWORD: anonymizer
      POSTGRES_DB: anonymizer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
